<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    Option 1 – Browser Play
    A browser window chrome bar (with traffic-light dots) above a content
    area centred on a solid play button — the most literal expression of
    "replay a browser session".
  -->
  <!-- Outer browser frame -->
  <rect x="3" y="7" width="42" height="34" rx="4" stroke="#7c3aed" stroke-width="2.5"/>
  <!-- Chrome bar — rounded top, flat bottom -->
  <rect x="3" y="7" width="42" height="12" rx="4" fill="#7c3aed"/>
  <rect x="3" y="13" width="42" height="6" fill="#7c3aed"/>
  <!-- Traffic-light dots -->
  <circle cx="10" cy="12.5" r="2" fill="#f87171"/>
  <circle cx="17" cy="12.5" r="2" fill="#fbbf24"/>
  <circle cx="24" cy="12.5" r="2" fill="#34d399"/>
  <!-- Play button circle -->
  <circle cx="24" cy="30" r="9" fill="#a78bfa"/>
  <!-- Play triangle -->
  <polygon points="21.5,26 21.5,34 30.5,30" fill="white"/>
</svg>
