<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    Option 2 – Event Capture
    A dashed capture frame surrounds a mouse cursor; a live recording dot
    pulses in the top-right corner.  Emphasises the browser-session capture phase.
  -->
  <!-- Dashed capture frame -->
  <rect x="4" y="10" width="40" height="30" rx="4"
        stroke="#7c3aed" stroke-width="3" stroke-dasharray="5 3"/>
  <!-- Mouse cursor (simplified pointer) -->
  <path d="M15 16 L15 33 L20 27 L24 35 L27 33.5 L23 26 L29 26 Z"
        fill="#a78bfa"/>
  <!-- Recording dot -->
  <circle cx="38" cy="16" r="3.5" fill="#38bdf8"/>
  <!-- Pulse ring -->
  <circle cx="38" cy="16" r="6.5" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.45"/>
</svg>
