<svg xmlns="http://www.w3.org/2000/svg">
  <!-- Toolkit sprite sheet – Claude Session Replay & Animation Export -->

  <!-- replay-icon: circular clockwise arrow + play triangle -->
  <symbol id="replay-icon" viewBox="0 0 48 48" fill="none">
    <defs>
      <marker id="si-replay-arr" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="3" markerHeight="3" orient="auto">
        <path d="M0 1 L9 5 L0 9 Z" fill="#7c3aed"/>
      </marker>
    </defs>
    <path d="M40 24 A16 16 0 1 1 35.3 12.7"
          stroke="#7c3aed" stroke-width="4" stroke-linecap="round"
          marker-end="url(#si-replay-arr)"/>
    <polygon points="19,16 35,24 19,32" fill="#a78bfa"/>
  </symbol>

  <!-- capture-icon: dashed frame + cursor + recording dot -->
  <symbol id="capture-icon" viewBox="0 0 48 48" fill="none">
    <rect x="4" y="10" width="40" height="30" rx="4"
          stroke="#7c3aed" stroke-width="3" stroke-dasharray="5 3"/>
    <path d="M15 16 L15 33 L20 27 L24 35 L27 33.5 L23 26 L29 26 Z"
          fill="#a78bfa"/>
    <circle cx="38" cy="16" r="3.5" fill="#38bdf8"/>
    <circle cx="38" cy="16" r="6.5" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.45"/>
  </symbol>

  <!-- timeline-icon: track + keyframes + playhead -->
  <symbol id="timeline-icon" viewBox="0 0 48 48" fill="none">
    <line x1="4" y1="32" x2="44" y2="32" stroke="#4c1d95" stroke-width="3" stroke-linecap="round"/>
    <path d="M12 32 L15 28 L18 32 L15 36 Z" fill="#7c3aed"/>
    <path d="M22 32 L25 28 L28 32 L25 36 Z" fill="#7c3aed"/>
    <path d="M32 32 L35 28 L38 32 L35 36 Z" fill="#7c3aed" opacity="0.4"/>
    <line x1="25" y1="14" x2="25" y2="44" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="20,14 25,21 30,14" fill="#38bdf8"/>
  </symbol>

  <!-- export-icon: film strip + upward arrow -->
  <symbol id="export-icon" viewBox="0 0 48 48" fill="none">
    <rect x="4" y="8" width="30" height="34" rx="3" stroke="#7c3aed" stroke-width="3"/>
    <rect x="4" y="13" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="4" y="24" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="4" y="35" width="6" height="6" rx="1" fill="#7c3aed"/>
    <line x1="15" y1="18" x2="28" y2="18" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="25" x2="28" y2="25" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="32" x2="28" y2="32" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="36" x2="40" y2="18" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <polyline points="34,24 40,18 46,24" stroke="#38bdf8" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- spark-icon: outer circle + inner arc + play triangle (brand mark) -->
  <symbol id="spark-icon" viewBox="0 0 48 48" fill="none">
    <defs>
      <marker id="si-spark-arr" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="3.5" markerHeight="3.5" orient="auto">
        <path d="M0 1 L9 5 L0 9 Z" fill="#a78bfa"/>
      </marker>
    </defs>
    <circle cx="24" cy="24" r="20" stroke="#7c3aed" stroke-width="3"/>
    <path d="M35 24 A11 11 0 1 1 31.8 16.2"
          stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"
          marker-end="url(#si-spark-arr)"/>
    <polygon points="19,17 33,24 19,31" fill="#7c3aed"/>
  </symbol>
</svg>
